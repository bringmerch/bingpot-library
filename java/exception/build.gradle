// The core build script detailing dependencies and plugins
plugins {
    id 'java'
    id 'application'
}

group = 'bringmerch'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'pkg.Application'
}

dependencies {
