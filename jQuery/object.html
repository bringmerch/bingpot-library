<!--
 이 페이지에서 배울 수 있는 것
 1. 객체 키 리스트 뽑기 (key in object)
 2. onclick 인라인으로 핸들러를 정의할 때 this 넘기기
 3. user action에 따른 style 제어를 객체에 정의
-->
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Function</title>
</head>
<body>
	<input type="button" value="night" onclick="onclickHandler(this)"/> <!-- this = input태그 -->
	<input type="button" value="day" onclick="onclickHandler(this)"/>
	<h2> this is title. </h2>
<script src="파일분리/color.js"></script>
</body>
</html>
